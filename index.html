<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Background</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0f172a;
color: white;
text-align: center;
padding: 50px;
}

.container {
max-width: 600px;
margin: auto;
background: rgba(255,255,255,0.05);
padding: 30px;
border-radius: 20px;
}

h1 {
margin-bottom: 20px;
}

input {
margin-top: 10px;
}

button {
padding: 12px 20px;
border: none;
border-radius: 10px;
background: #3b82f6;
color: white;
cursor: pointer;
margin-top: 20px;
}

button:hover {
background: #2563eb;
}
</style>
</head>

<body>

<div class="container">

<h1>إزالة الخلفية من الصور</h1>

<p>ارفع صورة وسيتم معالجتها</p>

<input type="file" id="fileInput" accept="image/*">

<br><br>

<img id="preview" style="max-width:100%;display:none;border-radius:10px;">

<br>

<button id="removeBtn">إزالة الخلفية</button>

<p id="status"></p>

<img id="result" style="max-width:100%;display:none;border-radius:10px;margin-top:20px;">

</div>

<script>
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const removeBtn = document.getElementById("removeBtn");
const status = document.getElementById("status");
const result = document.getElementById("result");

fileInput.addEventListener("change", function () {
const file = this.files[0];

if(file){
const reader = new FileReader();

reader.onload = function(e){
preview.src = e.target.result;
preview.style.display = "block";
}

reader.readAsDataURL(file);
}
});

removeBtn.addEventListener("click", async function () {

const file = fileInput.files[0];

if(!file){
alert("اختر صورة أولاً");
return;
}

status.innerText = "جاري المعالجة...";

const formData = new FormData();
formData.append("image_file", file);

const response = await fetch("https://api.remove.bg/v1.0/removebg", {
method: "POST",
headers: {
"X-Api-Key": "kWUAGHZjvVVJBcKpYxd2VsYi"
},
body: formData
});

if(!response.ok){
status.innerText = "حدث خطأ";
return;
}

const blob = await response.blob();
const url = URL.createObjectURL(blob);

result.src = url;
result.style.display = "block";

status.innerText = "تم بنجاح ✔";
});
</script>

</body>
</html>

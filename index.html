<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Background</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #0f172a, #1e293b);
color: white;
text-align: center;
}

.container {
max-width: 600px;
margin: 80px auto;
padding: 30px;
background: rgba(255,255,255,0.05);
border-radius: 20px;
backdrop-filter: blur(10px);
box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

h1 {
font-size: 28px;
margin-bottom: 10px;
}

p {
opacity: 0.8;
}

input {
margin-top: 20px;
padding: 10px;
border-radius: 10px;
border: none;
width: 80%;
}

button {
margin-top: 20px;
padding: 12px 25px;
border: none;
border-radius: 10px;
background: #3b82f6;
color: white;
cursor: pointer;
font-size: 16px;
transition: 0.3s;
}

button:hover {
background: #2563eb;
transform: scale(1.05);
}

footer {
margin-top: 30px;
font-size: 12px;
opacity: 0.6;
}
</style>

</head>

<body>

<div class="container">
<h1>إزالة الخلفية من الصور</h1>
<p>ارفع صورتك وسيتم تجهيزها تلقائياً</p>

<input type="file" id="fileInput" accept="image/*">

<br>

<img id="preview" style="max-width:100%;margin-top:20px;border-radius:10px;display:none;">

<br>

<button>رفع الصورة</button>

<footer>
أداة مجانية - تعمل على الهاتف والحاسوب
</footer>
</div>

</body>
</html>
